<!DOCTYPE html>
<html lang="fr">
<head>
  <style>
    * {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: hsl(240, 4%, 95%);
}

.conteneur {
  max-width: 780px;
  margin: 30px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: rgb(43, 43, 52);
}

.section {
  background: lch(92.15% 0.71 18.59);
  border: 1px solid #f6f7f9;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 16px;
}

.champ {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.champ input,
.champ select,
.champ textarea {
  padding: 10px;
  border: 1px solid #c7cfdb;
  border-radius: 6px;
  font: inherit;
}

.champ input:focus,
.champ select:focus,
.champ textarea:focus {
  outline: none;
  border-color: lab(93.32% -0.98 -8.01);
  box-shadow: 0 0 0 2px rgba(78, 87, 100, 0.2);
}

.requis::after {
  content: " *";
  color: #d62828;
}

fieldset.champ {
  border: 1px solid #d7deea;
  border-radius: 8px;
}

fieldset.champ label {
  margin-bottom: 6px;
}

.ligne {
  flex-direction: row;
  align-items: center;
}

button {
  border: none;
  background: #491dd8ed;
  color: #0c0c0c;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #e8e9eb;
}
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire</title>
  <link rel="stylesheet" href="formulaire d'inscription.css">
</head>
<body>
  <main class="conteneur">
    <h1>Inscription à l'événement</h1>
    <form action="#" method="post" class="formulaire">
      <div class="section">
        <h2>Informations personnelles</h2>
        <div class="champ">
          <label class="requis" for="prenom">Prénom</label>
          <input type="text" id="prenom" name="prenom" required>
        </div>
        <div class="champ">
          <label class="requis" for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required>
        </div>
        <div class="champ">
          <label class="requis" for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="champ">
          <label for="naissance">Date de naissance</label>
          <input type="date" id="naissance" name="naissance">
        </div>
        <div class="champ">
          <label for="telephone">Téléphone</label>
          <input type="tel" id="telephone" name="telephone">
        </div>
      </div>

      <div class="section">
        <h2>Préférences</h2>
        <div class="champ">
          <label class="requis" for="ville">Ville</label>
          <select id="ville" name="ville" required>
            <option value="">Choisir une ville</option>
            <option>Touba</option>
            <option>Mbacké</option>
            <option>Saint-Louis</option>
            <option>Louga</option>
          </select>
        </div>

        <fieldset class="champ">
          <legend class="requis">Type de billet</legend>
          <label><input type="radio" name="billet" value="standard" required> Standard</label>
          <label><input type="radio" name="billet" value="vip"> VIP</label>
        </fieldset>

        <fieldset class="champ">
          <legend>Centres d'intérêt</legend>
          <label><input type="checkbox" name="interets" value="web">Informatique</label>
          <label><input type="checkbox" name="interets" value="design">Cuisine</label>
          <label><input type="checkbox" name="interets" value="ia">Voyage</label>
        </fieldset>
      </div>

      <div class="section">
        <h2>Validation de l'inscription</h2>
        <div class="champ">
          <label for="commentaire">Ajouter des commentaire</label>
          <textarea id="commentaire" name="commentaire" rows="4"></textarea>
        </div>
        <div class="champ ligne">
          <label for="conditions">
            <input type="checkbox" id="conditions" name="conditions" required>
            J'accepte toutes les conditions d'utilisation
          </label>
        </div>
        <button type="submit">Soumettre</button>
      </div>
    </form>
  </main>
</body>
</html>
